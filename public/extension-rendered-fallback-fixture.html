<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension Rendered Fallback Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #101314;
      color: #eef3f1;
    }

    .message-card {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 24px;
      background: #171d1f;
    }

    img {
      display: block;
      max-width: 100%;
      border-radius: 18px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .action-row button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: #273136;
      color: #dce7e3;
    }
  </style>
</head>
<body>
  <div class="message-card">
    <img
      id="fallbackFixtureImage"
      src="/src/assets/samples/5.png"
      alt="rendered fallback image"
    >
    <div class="action-row">
      <button type="button" aria-label="like">+</button>
      <button type="button" aria-label="dislike">-</button>
      <button type="button" aria-label="share">↗</button>
      <button type="button" aria-label="more">⋮</button>
    </div>
  </div>
</body>
</html>
