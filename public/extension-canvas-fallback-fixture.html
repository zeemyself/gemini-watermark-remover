<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension Canvas Fallback Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #151819;
      color: #eff3f2;
    }

    .message-card {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 24px;
      background: #202729;
    }

    canvas,
    img {
      display: block;
      max-width: 100%;
      border-radius: 18px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .action-row button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: #2b3538;
      color: #dce7e3;
    }
  </style>
</head>
<body>
  <div class="message-card">
    <canvas id="canvasFallbackFixture" width="1024" height="1024"></canvas>
    <div class="action-row">
      <button type="button" aria-label="like">+</button>
      <button type="button" aria-label="dislike">-</button>
      <button type="button" aria-label="share">↗</button>
      <button type="button" aria-label="more">⋮</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvasFallbackFixture');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = '/src/assets/samples/5.png';
  </script>
</body>
</html>
