<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #f4f7f1;
      color: #1b271f;
    }

    generated-image {
      display: block;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    img {
      display: block;
      max-width: 100%;
      border-radius: 16px;
    }

    .native-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .native-actions button {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: #e8ece5;
      color: #273329;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <generated-image>
    <img
      id="fixtureImage"
      src="/src/assets/samples/5.png"
      data-gwr-source-url="https://lh3.googleusercontent.com/rd-gg/example=s1024"
      alt="fixture image"
    >
    <div class="native-actions">
      <button type="button" data-native-action="copy" aria-label="复制">复制</button>
      <button type="button" data-native-action="download" aria-label="下载">下载</button>
    </div>
  </generated-image>
</body>
</html>
