<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension Src Rerender Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #f4f7f1;
      color: #1b271f;
    }

    generated-image {
      display: block;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    img {
      display: block;
      max-width: 100%;
      border-radius: 16px;
    }

    .native-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <generated-image id="fixtureHost">
    <img
      id="rerenderFixtureImage"
      src="/src/assets/samples/5.png"
      data-gwr-source-url="https://lh3.googleusercontent.com/rd-gg/example=s1024"
      alt="fixture image"
    >
    <div class="native-actions">
      <button type="button" data-native-action="copy" aria-label="复制">复制</button>
      <button type="button" data-native-action="download" aria-label="下载">下载</button>
    </div>
  </generated-image>

  <script>
    (() => {
      const host = document.getElementById('fixtureHost');
      const originalSrc = '/src/assets/samples/5.png';
      const sourceUrl = 'https://lh3.googleusercontent.com/rd-gg/example=s1024';
      let rerenderCount = 0;

      function attachWatcher(image) {
        new MutationObserver(() => {
          if (!image.src.startsWith('blob:')) return;
          rerenderCount += 1;
          const replacement = image.cloneNode(true);
          replacement.id = 'rerenderFixtureImage';
          replacement.src = originalSrc;
          replacement.dataset.gwrSourceUrl = sourceUrl;
          image.replaceWith(replacement);
          attachWatcher(replacement);
        }).observe(image, {
          attributes: true,
          attributeFilter: ['src']
        });
      }

      attachWatcher(document.getElementById('rerenderFixtureImage'));
      window.__gwrFixtureRerenderCount = () => rerenderCount;
    })();
  </script>
</body>
</html>
