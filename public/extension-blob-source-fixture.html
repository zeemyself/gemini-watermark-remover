<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension Blob Source Fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #11151a;
      color: #edf3f0;
    }

    .message-card {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 24px;
      background: #182026;
    }

    img {
      display: block;
      max-width: 100%;
      border-radius: 18px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .action-row button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: #2a333b;
      color: #dce7e3;
    }
  </style>
</head>
<body>
  <div class="message-card">
    <img id="blobFixtureImage" alt="blob source image">
    <div class="action-row">
      <button type="button" aria-label="like">+</button>
      <button type="button" aria-label="dislike">-</button>
      <button type="button" aria-label="share">↗</button>
      <button type="button" aria-label="more">⋮</button>
    </div>
  </div>
  <script>
    window.__fixtureReady = (async () => {
      const response = await fetch('/src/assets/samples/5.png');
      const blob = await response.blob();
      const blobUrl = URL.createObjectURL(blob);
      const image = document.getElementById('blobFixtureImage');
      image.src = blobUrl;
      await image.decode();
      return blobUrl;
    })();
  </script>
</body>
</html>
