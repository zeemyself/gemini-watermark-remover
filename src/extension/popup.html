<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini Watermark Remover</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      min-width: 280px;
      background: #f5f7f3;
      color: #132018;
    }

    main {
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
    }

    p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #476053;
    }

    .panel {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #d8e0d6;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .metric {
      padding: 10px;
      border-radius: 10px;
      background: #eef5ec;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    button {
      width: 100%;
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #1f8f4f;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    label {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      font-size: 13px;
      color: #2f4536;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    #status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 12px;
      color: #5d7264;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gemini 去水印扩展</h1>
    <p>当前版本使用下载流 hook。这里展示当前页面的拦截状态。</p>

    <section class="panel">
      <div class="stats">
        <div class="metric">
          <span>已拦截</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>处理成功</span>
          <strong id="readyCount">0</strong>
        </div>
        <div class="metric">
          <span>处理失败</span>
          <strong id="failedCount">0</strong>
        </div>
        <div class="metric">
          <span>Hook 已安装</span>
          <strong id="installedState">否</strong>
        </div>
      </div>
      <div id="status"></div>
    </section>
  </main>

  <script src="./popup.js"></script>
</body>
</html>
